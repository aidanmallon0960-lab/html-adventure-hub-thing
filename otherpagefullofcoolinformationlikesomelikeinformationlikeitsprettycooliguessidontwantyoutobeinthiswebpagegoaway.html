<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>real hell</title>
    <link rel="stylesheet" type="text/css " href="css/style.css" />
  </head>
  <body
    style="
      background-color: red;
      background-image: url(https://media.tenor.com/8fpqBIFXC0IAAAAC/fire-flames.gif);
      background-repeat: no-repeat;
      background-size: cover;
    "
  >
    <header>
      <h1 style="background-color: red">
        real hell (super scary and red and fiery )
      </h1>
      <nav>
        <ul>
          <li>
            <p><a href="index.html">click to leave</a></p>
          </li>
          <li>
            <p>
              <a href="something.html"
                >cool clicker game (point of no return)</a
              >
            </p>
          </li>
        </ul>
      </nav>
    </header>
    <main style="display: flex">
      <div class="myform">
        <form action="idk.html" method="post">
          <div>
            <label for="name">full legal name: </label>
            <input type="text" id="name" name="name" />
          </div>
          <div>
            <label for="dob">date of birth: </label>
            <input type="date" id="dob" name="dob" />
          </div>
          <div>
            <label for="address">home address: </label>
            <input type="text" id="address" name="address" />
          </div>
          <div>
            <label for="ssn">social security number: </label>
            <input
              type="text"
              id="ssn"
              placeholder="AAA-GG-SSSS"
              pattern="[0-9]{3}-[0-9]{2}-[0-9]{4}"
              name="ssn"
            />
          </div>
          <div>
            <label for="email">email: </label>
            <input
              type="email"
              id="email"
              placeholder="email@email.com"
              name="email"
            />
          </div>
          <div>
            <label for="ccn">credit card number: </label>
            <input type="text" id="ccn" name="ccn" />
          </div>
          <div>
            <label for="pin">pin: </label>
            <input type="text" id="pin" name="pin" />
          </div>
          <div>
            <label for="Upload"
              >upload any official documents (passport, drivers licence,
              ect.):</label
            >
            <input
              type="file"
              id="Upload"
              name="file/upload"
              accept="image/png, image/jpg, document/pdf"
            />
          </div>
          <div>
            <label for="comment">any additional personal information: </label>
            <textarea name="comment" id="comment" rows="5" cols="50"></textarea>
          </div>
          <div>
            <input type="submit" value="Submit" />
            <input type="reset" value="Reset" />
          </div>
        </form>
        <aside>
          <table>
            <thead>
              <th>1</th>
              <th>2</th>
              <th>3</th>
            </thead>
            <tbody>
              <tr>
                4
              </tr>
              <tr>
                5
              </tr>
              <tr>
                6
              </tr>
            </tbody>
          </table>
        </aside>
      </div>
      <div>
        <img src="images/fdtbao.gif" alt="ferocious day to be an opp" />
      </div>
    </main>
  </body>
</html>
